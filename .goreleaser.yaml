version: 2
project_name: autormm

before:
  hooks:
    - go mod tidy
    # Populate the agent binaries the hub embeds and serves for one-command installs.
    # The version MUST be injected here too, or the served agents report "dev" and
    # the tray's auto-update loops forever against a versioned hub.
    - sh -c 'mkdir -p server/agentbins; for t in linux/amd64 linux/arm64 windows/amd64; do os=${t%/*}; arch=${t#*/}; ext=; [ "$os" = windows ] && ext=.exe; CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -ldflags "-s -w -X github.com/Paco5687/autormm/agent.Version={{ .Version }}" -o server/agentbins/autormm-agent_${os}_${arch}$ext ./cmd/autormm-agent; done'
    # The Windows desktop agent is a GUI (tray) build; the hub serves it for desktop installs.
    - sh -c 'CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -H=windowsgui -X github.com/Paco5687/autormm/agent.Version={{ .Version }}" -o server/agentbins/autormm-agent-tray_windows_amd64.exe ./cmd/autormm-agent-tray'

builds:
  - id: server
    main: ./cmd/autormm-server
    binary: autormm-server
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X github.com/Paco5687/autormm/server.Version={{ .Version }}

  - id: agent
    main: ./cmd/autormm-agent
    binary: autormm-agent
    env: [CGO_ENABLED=0]
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ignore:
      - { goos: windows, goarch: arm64 }
    flags: [-trimpath]
    ldflags:
      - -s -w -X github.com/Paco5687/autormm/agent.Version={{ .Version }}

  - id: agent-tray
    main: ./cmd/autormm-agent-tray
    binary: autormm-agent-tray
    env: [CGO_ENABLED=0]
    goos: [windows]
    goarch: [amd64]
    flags: [-trimpath]
    ldflags:
      # -H=windowsgui: no console window for the tray app.
      - -s -w -H=windowsgui -X github.com/Paco5687/autormm/agent.Version={{ .Version }}

  - id: client
    main: ./cmd/autormm-client
    binary: autormm-client
    env: [CGO_ENABLED=0]
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ignore:
      - { goos: windows, goarch: arm64 }
    flags: [-trimpath]
    ldflags:
      - -s -w -X github.com/Paco5687/autormm/agent.Version={{ .Version }}

# One archive per platform, bundling every binary valid for that platform plus
# the deploy scripts, so a single download can install any piece.
archives:
  - id: default
    ids: [server, agent, agent-tray, client]
    # server is linux-only, so windows/darwin archives carry fewer binaries.
    allow_different_binary_count: true
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - deploy/*        # top-level install scripts + traefik config
      - deploy/**/*     # nested systemd units + nfpm scripts

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

# Native Linux packages. The agent package installs a system unit; the server
# package ships the binary + docs (it is normally run as a systemd user service).
nfpms:
  - id: agent
    package_name: autormm-agent
    ids: [agent]
    formats: [deb, rpm]
    maintainer: Paco5687 <11847242+Paco5687@users.noreply.github.com>
    description: autormm host agent (metrics + remote-desktop)
    license: MIT
    bindir: /usr/bin
    contents:
      - src: deploy/systemd/autormm-agent.service
        dst: /lib/systemd/system/autormm-agent.service
      - src: deploy/systemd/agent.env.example
        dst: /etc/autormm/agent.env.example
        type: config|noreplace
    scripts:
      postinstall: deploy/nfpm/postinstall-agent.sh

  - id: server
    package_name: autormm-server
    ids: [server]
    formats: [deb, rpm]
    maintainer: Paco5687 <11847242+Paco5687@users.noreply.github.com>
    description: autormm hub server (telemetry, dashboard, session relay)
    license: MIT
    bindir: /usr/bin
    contents:
      - src: deploy/systemd/autormm-server.service
        dst: /usr/share/autormm/autormm-server.service
      - src: deploy/systemd/server.env.example
        dst: /etc/autormm/server.env.example
        type: config|noreplace
      - src: deploy/traefik-autormm.yml
        dst: /usr/share/autormm/traefik-autormm.yml

release:
  github:
    owner: Paco5687
    name: autormm
  draft: false
  prerelease: auto

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
