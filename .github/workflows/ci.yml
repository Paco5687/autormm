name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  cross-compile:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, cmd: cmd/autormm-server }
          - { goos: linux,   goarch: amd64, cmd: cmd/autormm-agent }
          - { goos: linux,   goarch: arm64, cmd: cmd/autormm-agent }
          - { goos: windows, goarch: amd64, cmd: cmd/autormm-agent }
          - { goos: linux,   goarch: amd64, cmd: cmd/autormm-client }
          - { goos: windows, goarch: amd64, cmd: cmd/autormm-client }
          - { goos: darwin,  goarch: arm64, cmd: cmd/autormm-client }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }} ${{ matrix.cmd }}
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-s -w" -o /dev/null ./${{ matrix.cmd }}
